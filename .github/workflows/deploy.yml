name: Deploy to Firebase on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Frontend
        run: |
          echo 'VITE_FIREBASE_API_KEY="AIzaSyCRUDbf30NXZSJsCH2w6WRZmUra49VqvVg"' > .env
          echo 'VITE_FIREBASE_AUTH_DOMAIN="scanron.firebaseapp.com"' >> .env
          echo 'VITE_FIREBASE_PROJECT_ID="scanron"' >> .env
          echo 'VITE_FIREBASE_STORAGE_BUCKET="scanron.firebasestorage.app"' >> .env
          echo 'VITE_FIREBASE_MESSAGING_SENDER_ID="649657897687"' >> .env
          echo 'VITE_FIREBASE_APP_ID="1:649657897687:web:3fa3bdaf5637f2f2e7d692"' >> .env
          echo 'VITE_DISCORD_CLIENT_ID="1517883839349784696"' >> .env
          npm run build

      - name: Install Functions Dependencies
        run: npm ci
        working-directory: functions

      - name: Build Functions
        run: npm run build
        working-directory: functions

      - name: Deploy to Firebase
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > gcp-key.json
          echo 'DISCORD_CLIENT_ID="1517883839349784696"' > functions/.env
          npx firebase-tools deploy --non-interactive --project scanron --force
          rm -f gcp-key.json
        env:
          GOOGLE_APPLICATION_CREDENTIALS: gcp-key.json
