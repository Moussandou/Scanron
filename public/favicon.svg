  <!-- Crosshair -->
  <line x1="24" y1="4" x2="24" y2="44" stroke="#64748b" stroke-width="0.8" opacity="0.25"/>
  <line x1="4" y1="24" x2="44" y2="24" stroke="#64748b" stroke-width="0.8" opacity="0.25"/>
  <!-- Sweeping beam -->
  <path d="M24 24 L24 3 A21 21 0 0 1 44 17 Z" fill="#ff7a00" opacity="0.25"/>
  <line x1="24" y1="24" x2="24" y2="3" stroke="#ff7a00" stroke-width="1.5"/>
